services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: fraud-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fraud-detection-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  enrichment-processor:
    build:
      context: ./streams
      dockerfile: Dockerfile
    container_name: fraud-enrichment
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  scoring-service:
    build:
      context: ./scoring-service
      dockerfile: Dockerfile
    container_name: fraud-scoring
    ports:
      - "5001:5000"
    environment:
      MODELS_DIR: /models
      API_KEY: ${API_KEY:-fraud-detection-api-key}
      RISK_THRESHOLD_LOW: "0.60"
      RISK_THRESHOLD_HIGH: "0.85"
    volumes:
      - ./models:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  risk-router:
    build:
      context: ./scoring-service
      dockerfile: Dockerfile.router
    container_name: fraud-router
    depends_on:
      kafka:
        condition: service_healthy
      scoring-service:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      SCORING_URL: http://scoring-service:5000/score
      API_KEY: ${API_KEY:-fraud-detection-api-key}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: fraud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - scoring-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: fraud-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  feedback-consumer:
    build:
      context: ./feedback
      dockerfile: Dockerfile
    container_name: fraud-feedback
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      FEEDBACK_BUFFER_PATH: /data/feedback/feedback_buffer.jsonl
    volumes:
      - feedback-data:/data/feedback
    restart: unless-stopped

  retrain-trigger:
    build:
      context: ./feedback
      dockerfile: Dockerfile
    container_name: fraud-retrain-trigger
    command: ["python", "retrain_trigger.py"]
    depends_on:
      - feedback-consumer
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      FEEDBACK_BUFFER_PATH: /data/feedback/feedback_buffer.jsonl
      DATASET_PATH: /data/raw/creditcard.csv
      RETRAIN_THRESHOLD: "500"
      CHECK_INTERVAL: "300"
    volumes:
      - feedback-data:/data/feedback
      - ./data/raw:/data/raw:ro
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw_transactions --partitions 6 --replication-factor 1 --config retention.ms=86400000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic enriched_transactions --partitions 6 --replication-factor 1 --config retention.ms=86400000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraud_alerts --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic approved_transactions --partitions 6 --replication-factor 1 --config retention.ms=86400000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic review_queue --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic feedback_labels --partitions 3 --replication-factor 1 --config retention.ms=604800000
    restart: on-failure

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  grafana-data:
  feedback-data:
