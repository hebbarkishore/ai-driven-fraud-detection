apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment-processor
  namespace: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enrichment-processor
  template:
    metadata:
      labels:
        app: enrichment-processor
    spec:
      containers:
        - name: enrichment-processor
          image: fraud-enrichment:latest
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
