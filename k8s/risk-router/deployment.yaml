apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-router
  namespace: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-router
  template:
    metadata:
      labels:
        app: risk-router
    spec:
      containers:
        - name: risk-router
          image: fraud-router:latest
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: fraud-detection-secrets
                  key: api-key
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
