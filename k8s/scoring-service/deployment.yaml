apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-service
  namespace: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scoring-service
  template:
    metadata:
      labels:
        app: scoring-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: scoring-service
          image: fraud-scoring:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: fraud-detection-secrets
                  key: api-key
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
